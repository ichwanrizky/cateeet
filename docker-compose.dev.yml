# ============================================================
#  docker-compose.dev.yml
#  Jalankan: docker compose -f docker-compose.dev.yml up -d
# ============================================================

services:
  db:
    image: mysql:8.0
    container_name: money_tracker_db
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ${DB_NAME}
      TZ: Asia/Jakarta
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: money_tracker_api
    restart: unless-stopped
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
    volumes:
      - ./api:/var/www/html
      - ./.env:/var/www/html/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
    driver: local
